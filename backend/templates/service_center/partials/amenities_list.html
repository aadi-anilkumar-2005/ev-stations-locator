<div class="view-section">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0 text-dark">Facility Amenities</h3>
            <p class="text-muted mb-0 small">Manage the features your center provides to customers.</p>
        </div>
        <a href="{% url 'service-amenity-add' %}" class="btn btn-emerald px-4 shadow-sm fw-bold d-flex align-items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Add Amenity
        </a>
    </div>

    <!-- Amenities Table -->
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-borderless align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="text-secondary fw-bold text-uppercase small ps-4 py-3">Amenity Name</th>
                        <th class="text-secondary fw-bold text-uppercase small py-3">Category</th>
                        <th class="text-end text-secondary fw-bold text-uppercase small pe-4 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for am in amenities %}
                    <tr class="border-bottom border-light">
                        <td class="ps-4 py-3">
                            <div class="fw-bold text-dark">{{ am.name }}</div>
                        </td>
                        <td class="py-3">
                            <span class="badge bg-light text-secondary border px-3 py-2 rounded-pill">
                                {{ am.category|capfirst }}
                            </span>
                        </td>
                        <td class="text-end pe-4 py-3">
                            <a href="{% url 'service-amenity-edit' pk=am.id %}"
                               class="btn btn-sm btn-light border rounded-circle shadow-sm me-1"
                               title="Edit Amenity"
                               style="width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;">
                                <i data-lucide="edit-2" class="w-4 h-4 text-primary"></i>
                            </a>
                            <form action="{% url 'service-amenity-delete' pk=am.id %}" method="post" class="d-inline">
                                {% csrf_token %}
                                <button type="submit"
                                        class="btn btn-sm btn-light border rounded-circle shadow-sm"
                                        title="Delete Amenity"
                                        style="width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;"
                                        onclick="return confirm('Remove this amenity?');">
                                    <i data-lucide="trash-2" class="w-4 h-4 text-danger"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted py-5">
                            <i data-lucide="coffee" class="w-8 h-8 d-block mx-auto mb-2 opacity-50"></i>
                            <div class="fw-medium">No amenities recorded yet.</div>
                            <a href="{% url 'service-amenity-add' %}" class="btn btn-sm btn-emerald mt-3">
                                <i data-lucide="plus" class="w-3 h-3 me-1 d-inline"></i> Add your first amenity
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
