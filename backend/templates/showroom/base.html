<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChargePoint - Showroom Admin Portal{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --sidebar-width: 280px;
            --primary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --bg-light: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        /* --- Animations --- */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .view-section {
            animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered Row Animations */
        tbody tr {
            animation: fadeSlideUp 0.4s ease forwards;
            opacity: 0;
        }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
        tbody tr:nth-child(4) { animation-delay: 0.4s; }
        tbody tr:nth-child(5) { animation-delay: 0.5s; }

        /* --- Sidebar Styles --- */
        #sidebar-container {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: white;
            border-right: none;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1040;
        }

        #sidebar-container.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .brand-logo {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-link-custom {
            color: #94a3b8;
            border-radius: 0.75rem;
            padding: 0.85rem 1.25rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-link-custom::before {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 0;
            background: var(--primary-gradient);
            opacity: 0.1;
            transition: width 0.3s ease;
            z-index: 0;
        }

        .nav-link-custom:hover {
            color: white;
            transform: translateX(5px);
        }

        .nav-link-custom:hover::before { width: 100%; }

        .nav-link-custom.active {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            box-shadow: inset 3px 0 0 #10b981;
        }

        .nav-link-custom i { z-index: 1; position: relative; }
        .nav-link-custom span { z-index: 1; position: relative; }

        /* --- Cards & UI Elements --- */
        .card {
            border-radius: 1rem;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.2);
        }

        .btn-emerald {
            background: var(--primary-gradient);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-emerald:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -5px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .welcome-banner {
            background: var(--primary-gradient);
            color: white;
            border-radius: 1rem;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .welcome-banner::after {
            content: '';
            position: absolute;
            top: -50%; right: -10%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Map Container */
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            border: 2px solid #e2e8f0;
            z-index: 1;
        }

        .badge-animated {
            transition: transform 0.2s ease;
        }
        .badge-animated:hover {
            transform: scale(1.1);
        }

        #logout-screen {
            position: fixed;
            inset: 0;
            background: var(--sidebar-bg);
            color: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #logout-screen.show {
            opacity: 1;
            pointer-events: all;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <div class="d-flex h-100">
        <!-- Sidebar -->
        {% include 'showroom/partials/sidebar.html' %}

        <!-- Main Content -->
        <main class="flex-grow-1 overflow-auto vh-100 bg-light position-relative">
            <!-- Header -->
            {% include 'showroom/partials/header.html' %}

            <div class="p-4 p-md-5">
                {% if error %}
                <div class="alert alert-danger mb-4 rounded-3 shadow-sm">{{ error }}</div>
                {% endif %}
                
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <!-- Logout Full Screen overlay -->
    <div id="logout-screen">
        <i data-lucide="shield-check" class="text-emerald mb-3" style="width: 64px; height: 64px; animation: scaleIn 0.5s ease;"></i>
        <h2 class="fw-bold">Logging Out...</h2>
        <p class="text-muted">Securing your session.</p>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        function toggleSidebar() {
            document.getElementById('sidebar-container').classList.toggle('collapsed');
            setTimeout(() => { if (typeof map !== 'undefined' && map) map.invalidateSize(); }, 350); 
        }

        function handleLogout() {
            const screen = document.getElementById('logout-screen');
            screen.classList.add('show');
            setTimeout(() => {
                // Adjust to the right login url
                window.location.href = "{% url 'admin-login' %}";
            }, 1000);
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
