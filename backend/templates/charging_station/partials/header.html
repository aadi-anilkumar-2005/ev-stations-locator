<div class="bg-white p-3 shadow-sm d-flex justify-content-between align-items-center sticky-top z-3">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light border d-none d-md-flex align-items-center justify-content-center hover-card" type="button" onclick="toggleSidebar()" style="width: 42px; height: 42px;" title="Toggle Sidebar">
            <i data-lucide="menu" class="text-secondary w-5 h-5"></i>
        </button>
        <h5 class="fw-bold mb-0 brand-logo d-md-none"><i data-lucide="zap" class="w-5 h-5"></i> ChargePoint</h5>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="d-none d-md-block text-end">
            <div class="fw-bold text-dark small">{{ request.user.username }}</div>
            <div class="text-muted" style="font-size: 0.75rem;">Administrator</div>
        </div>
        <button class="btn btn-light border d-md-none d-flex align-items-center justify-content-center hover-card" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" style="width: 42px; height: 42px;" aria-label="Toggle Menu">
            <i data-lucide="menu" class="text-secondary w-5 h-5"></i>
        </button>
    </div>
</div>
