{% extends 'charging_station/base.html' %}

{% block content %}
<div class="view-section active">
    <header class="d-flex align-items-center gap-3 mb-4">
        <a href="{% url 'admin-cs-chargers' %}" class="btn btn-white shadow-sm border rounded-circle p-2">
            <i data-lucide="arrow-left" class="w-5 h-5 text-dark"></i>
        </a>
        <div>
            <h4 class="fw-bold mb-0 text-dark">{% if charger %}Edit Charger Type{% else %}Add Charger Type{% endif %}</h4>
            <p class="text-muted mb-0 small">Create or update hardware specifications.</p>
        </div>
    </header>

    <form method="POST" action="{% if charger %}{% url 'admin-cs-charger-edit' charger.id %}{% else %}{% url 'admin-cs-charger-add' %}{% endif %}" class="mx-auto mx-md-0" style="max-width: 600px;">
        {% csrf_token %}
        <div class="card shadow-sm mb-4">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold small text-uppercase">Name</label>
                    <input type="text" name="name" class="form-control form-control-lg bg-light" placeholder="e.g. DC Fast 150kW" value="{{ charger.name|default:'' }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold small text-uppercase">Connector Type</label>
                    <input type="text" name="connector_type" class="form-control form-control-lg bg-light" placeholder="e.g. CCS1, CHAdeMO" value="{{ charger.connector_type|default:'' }}" required>
                </div>
                <div class="mb-2">
                    <label class="form-label text-secondary fw-bold small text-uppercase">Max Power (kW)</label>
                    <input type="number" step="0.1" name="max_power_kw" class="form-control form-control-lg bg-light" placeholder="e.g. 150.0" value="{{ charger.max_power_kw|default:'' }}" required>
                </div>
            </div>
        </div>
        <div class="d-flex gap-3">
            <a href="{% url 'admin-cs-chargers' %}" class="btn btn-white border flex-grow-1 py-3 fw-bold shadow-sm">Cancel</a>
            <button type="submit" class="btn btn-emerald flex-grow-1 py-3 fw-bold shadow">
                {% if charger %}Update Type{% else %}Save Type{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
