<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargePoint - Station Admin Portal</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --sidebar-width: 280px;
            --primary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --bg-light: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        /* --- Animations --- */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .view-section {
            animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered Row Animations */
        tbody tr {
            animation: fadeSlideUp 0.4s ease forwards;
            opacity: 0;
        }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
        tbody tr:nth-child(4) { animation-delay: 0.4s; }
        tbody tr:nth-child(5) { animation-delay: 0.5s; }

        /* --- Sidebar Styles --- */
        #sidebar-container {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: white;
            border-right: none;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1040;
        }

        #sidebar-container.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .brand-logo {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-link-custom {
            color: #94a3b8;
            border-radius: 0.75rem;
            padding: 0.85rem 1.25rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-link-custom::before {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 0;
            background: var(--primary-gradient);
            opacity: 0.1;
            transition: width 0.3s ease;
            z-index: 0;
        }

        .nav-link-custom:hover {
            color: white;
            transform: translateX(5px);
        }

        .nav-link-custom:hover::before { width: 100%; }

        .nav-link-custom.active {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            box-shadow: inset 3px 0 0 #10b981;
        }

        .nav-link-custom i { z-index: 1; position: relative; }
        .nav-link-custom span { z-index: 1; position: relative; }

        /* --- Cards & UI Elements --- */
        .card {
            border-radius: 1rem;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.2);
        }

        .btn-emerald {
            background: var(--primary-gradient);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-emerald:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -5px rgba(16, 185, 129, 0.4);
            color: white;
        }

        /* Map Container */
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            border: 2px solid #e2e8f0;
            z-index: 1;
        }

        .badge-animated {
            transition: transform 0.2s ease;
        }
        .badge-animated:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="d-flex h-100">
        
        <!-- Sidebar Inclusion -->
        {% include 'charging_station/partials/sidebar.html' %}

        <!-- Main Content -->
        <main class="flex-grow-1 overflow-auto vh-100 bg-light position-relative">
            
            {% include 'charging_station/partials/header.html' %}

            <div class="p-4 p-md-5">
                {% block content %}
                {% endblock %}
            </div>
            
        </main>
    </div>

    <!-- Mobile Sidebar Offcanvas -->
    <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
            <h5 class="offcanvas-title brand-logo fw-bold d-flex align-items-center gap-2">
                <i data-lucide="zap"></i> ChargePoint
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-3">
            <a href="{% url 'admin-cs-dashboard' %}" class="nav-link-custom {% if active_page == 'dashboard' %}active{% endif %}">
                <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
            </a>
            <a href="{% url 'admin-cs-stations' %}" class="nav-link-custom {% if active_page == 'stations' %}active{% endif %}">
                <i data-lucide="battery-charging"></i> <span>Charging Stations</span>
            </a>
            <a href="{% url 'admin-cs-chargers' %}" class="nav-link-custom {% if active_page == 'charger_types' %}active{% endif %}">
                <i data-lucide="plug"></i> <span>Charger Types</span>
            </a>
            <a href="{% url 'admin-cs-amenities' %}" class="nav-link-custom {% if active_page == 'amenities' %}active{% endif %}">
                <i data-lucide="coffee"></i> <span>Facility Amenities</span>
            </a>
            <hr class="border-secondary opacity-25">
            <a href="{% url 'admin-logout' %}" class="nav-link-custom text-danger mt-4">
                <i data-lucide="log-out"></i> <span>Secure Logout</span>
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        function toggleSidebar() {
            document.getElementById('sidebar-container').classList.toggle('collapsed');
            if (typeof map !== 'undefined' && map) {
                setTimeout(() => map.invalidateSize(), 350); 
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>

</html>
