<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0">Station Management</h4>
                        <p class="text-muted mb-0 small">Manage all charging stations</p>
                    </div>
                    <a href="{% url 'admin-add-station' %}"
                        class="btn btn-emerald text-white fw-bold d-flex align-items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add Station
                    </a>
                </div>
            </header>
            <div class="p-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body border-bottom p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i data-lucide="search"
                                            class="w-4 h-4 text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0"
                                        placeholder="Search stations..." id="station-search">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="station-status-filter">
                                    <option value="all">All Status</option>
                                    <option value="active">Active</option>
                                    <option value="maintenance">Maintenance</option>
                                    <option value="offline">Offline</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="station-type-filter">
                                    <option value="all">All Types</option>
                                    <option value="DC Fast">DC Fast</option>
                                    <option value="Level 2">Level 2</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Station</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Location</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Operator</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Type</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Status</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Available</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Price</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="stations-table-body"></tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white p-4 rounded-bottom-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-muted small">Showing 1 to 5 of 5 stations</span>
                            <nav>
                                <ul class="pagination pagination-sm mb-0">
                                    <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                                    <li class="page-item active"><a class="page-link bg-emerald border-emerald"
                                            href="#">1</a></li>
                                    <li class="page-item"><a class="page-link text-dark" href="#">2</a></li>
                                    <li class="page-item"><a class="page-link text-dark" href="#">Next</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{% static 'admin/js/data.js' %}"></script>
    <script src="{% static 'admin/js/stations.js' %}"></script>
</body>

</html>
