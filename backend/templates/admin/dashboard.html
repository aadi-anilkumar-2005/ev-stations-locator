<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0">Dashboard Overview</h4>
                        <p class="text-muted mb-0 small">Welcome back, Admin</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-light border"><i data-lucide="bell" class="w-5 h-5"></i></button>
                        <a href="{% url 'admin-add-station' %}" class="btn btn-emerald text-white fw-bold">Add
                            Station</a>
                    </div>
                </div>
            </header>
            <div class="p-4">
                <div class="row g-4 mb-4" id="dashboard-stats"></div>

                <div class="row g-4 mb-4">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm h-100 rounded-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h5 class="fw-bold mb-0">Usage Analytics</h5>
                                    <select class="form-select form-select-sm w-auto">
                                        <option>Last 7 days</option>
                                        <option>Last 30 days</option>
                                    </select>
                                </div>
                                <div class="d-flex align-items-end justify-content-between gap-2 p-3 bg-light rounded-3"
                                    style="height: 200px;">
                                    <div class="w-100 bg-emerald rounded-top" style="height: 65%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 45%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 78%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 55%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 82%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 70%"></div>
                                    <div class="w-100 bg-emerald rounded-top" style="height: 88%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm h-100 rounded-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h5 class="fw-bold mb-0">Station Status</h5>
                                    <a href="#" class="text-emerald text-decoration-none fw-bold small">View All</a>
                                </div>
                                <div id="status-bars" class="d-flex flex-column gap-3"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom p-4 rounded-top-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0">Recent Activity</h5>
                            <a href="#" class="text-emerald text-decoration-none fw-bold small">View All</a>
                        </div>
                    </div>
                    <div class="list-group list-group-flush rounded-bottom-4" id="activity-list"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="{% static 'admin/js/data.js' %}"></script>
    <script src="{% static 'admin/js/dashboard.js' %}"></script>
</body>

</html>
