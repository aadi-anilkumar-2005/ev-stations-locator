<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Showroom - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex align-items-center gap-3">
                    <a href="{% url 'admin-showrooms' %}" class="btn btn-light rounded-circle p-2">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </a>
                    <div>
                        <h4 class="fw-bold mb-0">Add New Showroom</h4>
                        <p class="text-muted mb-0 small">Create a new vehicle showroom</p>
                    </div>
                </div>
            </header>
            <div class="p-4">
                <form class="mx-auto" style="max-width: 900px;" data-success-url="{% url 'admin-showrooms' %}"
                    onsubmit="event.preventDefault(); window.location.href=this.dataset.successUrl;">

                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Showroom Details</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary fw-medium">Showroom Name</label>
                                    <input type="text" class="form-control" placeholder="e.g. Tesla Gallery" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary fw-medium">Brand</label>
                                    <select class="form-select" id="form-brand"></select>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label text-secondary fw-medium">Operating Hours</label>
                                    <input type="text" class="form-control" placeholder="e.g. Mon-Sat 10:00 - 20:00">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Contact Information</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white text-muted"><i data-lucide="phone"
                                                class="w-4 h-4"></i></span>
                                        <input type="tel" class="form-control border-start-0"
                                            placeholder="+1 (555) 000-0000">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white text-muted"><i data-lucide="mail"
                                                class="w-4 h-4"></i></span>
                                        <input type="email" class="form-control border-start-0"
                                            placeholder="contact@showroom.com">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">Website</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white text-muted"><i data-lucide="globe"
                                                class="w-4 h-4"></i></span>
                                        <input type="url" class="form-control border-start-0" placeholder="https://">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Location</h5>
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-medium">Full Address</label>
                                <textarea class="form-control" rows="2" placeholder="123 Main Street"></textarea>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">City</label>
                                    <input type="text" class="form-control" placeholder="e.g. San Diego">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">State</label>
                                    <input type="text" class="form-control" placeholder="e.g. CA">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-secondary fw-medium">Zip Code</label>
                                    <input type="text" class="form-control" placeholder="e.g. 92101">
                                </div>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary fw-medium">Latitude</label>
                                    <input type="number" step="any" class="form-control" placeholder="37.7749">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary fw-medium">Longitude</label>
                                    <input type="number" step="any" class="form-control" placeholder="-122.4194">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Amenities & Features</h5>
                            <div class="row g-3" id="showroom-amenities"></div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 pb-5">
                        <a href="{% url 'admin-showrooms' %}" class="btn btn-light flex-grow-1 py-3 fw-bold">Cancel</a>
                        <button type="submit" class="btn btn-emerald text-white flex-grow-1 py-3 fw-bold">Create
                            Showroom</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="{% static 'admin/js/add-showroom.js' %}"></script>
</body>

</html>
