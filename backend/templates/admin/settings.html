<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <h4 class="fw-bold mb-0">Settings</h4>
                <p class="text-muted mb-0 small">Configuration</p>
            </header>
            <div class="p-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom px-4 pt-4 pb-0">
                        <ul class="nav nav-tabs card-header-tabs" id="settingsTabs">
                            <li class="nav-item">
                                <a class="nav-link active text-emerald border-bottom-emerald fw-bold"
                                    href="#">General</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Notifications</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Security</a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-medium">Company Name</label>
                                <input type="text" class="form-control" value="ChargePoint Network">
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Admin Email</label>
                                    <input type="email" class="form-control" value="admin@chargepoint.com">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Support Email</label>
                                    <input type="email" class="form-control" value="support@chargepoint.com">
                                </div>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="maintenanceMode">
                                <label class="form-check-label fw-medium" for="maintenanceMode">Maintenance Mode</label>
                                <div class="form-text">System will be temporarily unavailable to users</div>
                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="button" class="btn btn-light flex-grow-1">Cancel</button>
                                <button type="button" class="btn btn-emerald text-white flex-grow-1">Save
                                    Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Re-initialize icons
        lucide.createIcons();
    </script>
</body>

</html>
