<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0">Analytics</h4>
                        <p class="text-muted mb-0 small">Network performance insights</p>
                    </div>
                    <select class="form-select form-select-sm w-auto">
                        <option>Last 7 days</option>
                        <option>Last 30 days</option>
                    </select>
                </div>
            </header>
            <div class="p-4">
                <div class="row g-4 mb-4" id="analytics-stats"></div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white p-4">
                        <h5 class="fw-bold mb-0">Top Performing Stations</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Station</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Sessions</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Utilization</th>
                                </tr>
                            </thead>
                            <tbody id="top-stations-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{% static 'admin/js/data.js' %}"></script>
    <script src="{% static 'admin/js/analytics.js' %}"></script>
</body>

</html>
